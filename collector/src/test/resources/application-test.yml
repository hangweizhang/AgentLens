spring:
  datasource:
    url: jdbc:h2:mem:agentlens_test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    io.agentlens: INFO
    org.hibernate.SQL: WARN
